<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/estilos.css">



</head>

<body>
    <div id="navbar-container"></div>

    <h4 style="text-align: center;"><strong>Evento Nuevo</strong></h4>
    <h5 style="text-align: center;">Información del evento</h5>


    <form class="form-registro">

        <div>
            <label>Fecha de Publicación del Evento:</label>
            <label>Año:</label>
            <select name="year">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
            </select>
        </div>
        </fieldset>
        <div>
            <select name="Mes">
                <option value="1">Enero</option>
                <option value="2">Febrero</option>
                <option value="3">Marzo</option>
                <option value="4">Abril</option>
                <option value="5">Mayo</option>
                <option value="6">Junio</option>
                <option value="7">Julio</option>
                <option value="8">Agosto</option>
                <option value="9">Setiembre</option>
                <option value="10">Octubre</option>
                <option value="11">Noviembre</option>
                <option value="12">Diciembre</option>
            </select>
        </div>

        <select name="Dia">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
            <option value="16">16</option>
            <option value="17">17</option>
            <option value="18">18</option>
            <option value="19">19</option>
            <option value="20">20</option>
            <option value="21">21</option>
            <option value="22">22</option>
            <option value="23">23</option>
            <option value="24">24</option>
            <option value="25">25</option>
            <option value="26">26</option>
            <option value="27">27</option>
            <option value="28">28</option>
            <option value="28">29</option>
            <option value="28">30</option>
            <option value="28">31</option>
        </select>
        </div>
        <div>
            <label for="txtNombre">Nombre del Evento:</label>
            <input type="text" id="txtNombre" required>
        </div>

        <div>
            <label for="txtCorreo">Fecha del Evento:</label>
            <input type="text" id="txtCorreo" required>
        </div>

        <div>
            <label for="txtContrasenia">Horario del Evento:</label>
            <input type="text" id="txtContrasenia" required>
        </div>


        <div>
            <label for="txtProvincia">Lugar del Evento:</label>
            <input type="text" id="txtProvincia" required>
        </div>
        <div>
            <label for="txtCanton">Link Google Calendar:</label>
            <input type="text" id="txtCanton" required>
        </div>
        <div>
            <label for="txtDistrito">Descripción del Evento:</label>
            <input type="text" id="txtDistrito" required>
        </div>
        <div>
            <label for="txtUbicacion">Objetivos del Evento:</label>
            <input type="text" id="txtUbicacion">
        </div>

        <button type="button" id="btnRegistrarEmpleado">Guardar evento</button>

    </form>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="js/load-navbar.js"></script>
    <script src="js/empleado-registrar.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PONADIS</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="index.css">


</head>

<body>


    <div class="container-fluid topbar">
        <div class="row d-flex align items-center h-100">

            <div class="col-3"> <!--logo-->
                <a href="" class="logo text-white text-decoration-none">
                    <span class="visually-hidden">Inicio -</span>
                    <img src="Recursos/Sicid.png" alt="Sicid">
                </a>
            </div>

            <div class="col-6"> <!---Usuario / rol---->
                <p class="mb-0">
                    <strong><i>Noticias</i></strong>
                    <span class="visually-hidden">Rol:</span><i>• Editor</i>
                </p>

            </div>

            <div class="col-3"> <!---Otras opciones de configuración---->
                <div class="row d-flex align-items-center justify-content-around">
                    <div class="col-3 d-flex align-items-center justify-content-end">

                    </div>
                    <div class="col-1"> <!--Contraste-->
                        <button class="btn" aria-label="Cambiar el contraste">
                            <a href="#" data-toggle="tooltip" title="Contraste">
                                <i class="fa-solid fa-circle-half-stroke border p-2 me-2" aria-hidden="true"></i></a>
                        </button>

                    </div>

                    <div class="col-1"> <!--Notificaciones-->
                        <button class="btn" aria-label="Ver notificaciones">
                            <a href="#" data-toggle="tooltip" title="Notificaciones">
                                <i class="fa-solid fa-bell border p-2 me-2" aria-hidden="true"></i></a>
                        </button>
                    </div>

                    <div class="col-1"> <!--Usuario-->
                        <span class="border rounded-circle p-2">AB</span>

                    </div>
                </div>

            </div>
        </div>
        <!--Layout principal-->
        <main class="container-fluid">
            <div class="row">

                <!-- Barra lateral -->
                <div class="col-2 sidebar p-0">

                    <div class="role-box d-flex justify-content-between align-items-center p-3">
                    
                        <button aria-label="Eventos" class="btn btn-link p-0">
                            <i class="fas fa-sync-alt text-white" aria-hidden="true"></i>
                        </button>
                    </div>

                    <div class="p-3">

                        <h2 class="h6 text-muted"><strong>Eventos</strong></h2>

                        <ul class="list-unstyled list-productos">
                            <li>
                                <a href="" class="text-decoration-none">
                                    <span >Crear eventos</span>
                                </a>
                            </li>

                            <li>
                                <a href="" class="text-decoration-none mb-3">
                                    <span >Eventos publicados</span>
                                </a>
                            </li>

                            <li>
                                <a href="" class="text-decoration-none mb-3">
                                    <span >Eventos en borrador</span>
                                </a>
                            </li>

                            <li>
                                <a href="" class="text-decoration-none mb-3">
                                    <span ">Eventos Finalizados</span>
                                </a>
                            </li>
                            <div>
                                <h2 class="h6 text-muted"><strong>Usuarios</strong></h2>

                                <ul class="list-unstyled list-productos">
                                    <li>
                                        <a href="" class="text-decoration-none">
                                            <span >Crear Lista de Difusión</span>
                                        </a>
                                    </li>

                                    <li>
                                        <a href="" class="text-decoration-none mb-3">
                                            <span >Lista de Difusión</span>
                                        </a>
                                    </li>

                                    <li>
                                        <a href="" class="text-decoration-none mb-3">
                                            <span >Suscriptores</span>
                                        </a>
                                    </li>

                                    <li>
                                        <a href="" class="text-decoration-none mb-3">
                                            <span >Consultas</span>
                                        </a>
                                    </li>

                            </div>
                    </div>

            </div>

            
</body>

<div class="row">
    <footer>
        <div class="col text-dark text-center">
            <p>© 2026 GAME CORNER</p>
        </div>
    </footer>
</div>



</html>
